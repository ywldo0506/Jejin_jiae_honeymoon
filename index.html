<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>신혼여행 일정표 · Honeymoon Itinerary</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Honeymoon">
<meta name="theme-color" content="#4A2C6D">
<link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/72x72/1f3ee.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Parisienne&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F7F2FA;
    --ink:#3A2B4D;
    --teal:#6B3FA0;
    --teal-deep:#4A2C6D;
    --coral:#D9607A;
    --sand:#EEE1F2;
    --line:#E5D9EE;
    --card:#FFFFFF;
    --need:#D9607A;
    --done:#6B3FA0;
    --none:#AFA0A8;
    --gold:#E3A93E;
    --gold-deep:#C6862A;
    --sky-top:#211533;
    --sky-mid:#5C3487;
    --sky-bottom:#C9A0DC;
    --c-move:#6B3FA0;
    --c-meal:#D9607A;
    --c-sight:#C6862A;
    --c-shop:#2E8B78;
    --c-stay:#8B5FBF;
    --c-etc:#9B8FA0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 8%, rgba(107,63,160,.07), transparent 42%),
      radial-gradient(circle at 88% 18%, rgba(227,169,62,.06), transparent 38%),
      radial-gradient(circle at 50% 60%, rgba(107,63,160,.04), transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:960px;margin:0 auto;padding:28px 20px 100px;}

  header.top{
    margin:-28px -20px 22px;
    padding:40px 20px 30px;
    background:linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 55%, var(--sky-bottom) 100%);
    position:relative;
    overflow:hidden;
    border-radius:0 0 32px 32px;
  }
  .sky-deco{position:absolute; inset:0; overflow:hidden; pointer-events:none;}
  .star{position:absolute; width:3px; height:3px; background:#fff; border-radius:50%; opacity:.8; animation:twinkle 3s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:.2; transform:scale(1);} 50%{opacity:1; transform:scale(1.6);}}
  .lantern{
    position:absolute; bottom:-40px; width:22px; height:28px; border-radius:6px 6px 3px 3px;
    background:radial-gradient(circle at 50% 35%, #FFE8B0 0%, var(--gold) 55%, var(--gold-deep) 100%);
    box-shadow:0 0 14px 4px rgba(227,169,62,.55);
    animation:floatLantern linear infinite;
  }
  .lantern::before{content:""; position:absolute; top:-5px; left:50%; transform:translateX(-50%); width:10px; height:5px; border-radius:50% 50% 0 0; background:var(--gold-deep);}
  .lantern::after{content:""; position:absolute; left:50%; top:6px; transform:translateX(-50%); width:14px; height:1px; background:rgba(74,40,20,.35);}
  @keyframes floatLantern{
    0%{transform:translate(0,0); opacity:0;}
    8%{opacity:.95;}
    50%{transform:translate(14px,-140px);}
    92%{opacity:.85;}
    100%{transform:translate(-6px,-260px); opacity:0;}
  }
  .honeymoon-label{display:block; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--gold); text-transform:uppercase; position:relative; margin-bottom:2px;}
  h1{font-family:'Fraunces',serif; font-weight:600; font-size:30px; margin:10px 0 0; color:#fff; position:relative; text-shadow:0 2px 10px rgba(0,0,0,.25);}
  .honeymoon-script{font-family:'Parisienne',cursive; font-size:42px; line-height:1.15; color:var(--gold); display:block; margin:8px 0 4px -2px; position:relative; text-shadow:0 0 18px rgba(227,169,62,.5);}
  .sub{color:#F3E7CE; font-size:13px; position:relative; opacity:.9;}

  .days-row{display:flex; gap:8px; margin-top:20px; overflow-x:auto; padding-bottom:6px;}
  .day-tab{
    flex:0 0 auto; position:relative; padding:9px 16px; border-radius:999px;
    border:1px solid rgba(255,255,255,.4); background:rgba(255,255,255,.15);
    font-size:13px; font-weight:600; cursor:pointer; color:#fff;
    display:flex; align-items:center; gap:6px; white-space:nowrap; backdrop-filter:blur(2px);
  }
  .day-tab.active{background:#fff; color:var(--teal-deep); border-color:#fff;}
  .day-tab .del-day{opacity:.6; font-size:11px; margin-left:2px;}
  .day-tab .del-day:hover{opacity:1;}
  .add-day{flex:0 0 auto; padding:9px 14px; border-radius:999px; border:1px dashed rgba(255,255,255,.6); background:transparent; color:#fff; font-weight:600; font-size:13px; cursor:pointer;}

  .view-toggle{display:flex; gap:6px; margin:18px 0 0;}
  .view-btn{flex:1; padding:10px 6px; border-radius:10px; border:1px solid var(--line); background:var(--card); font-weight:700; font-size:12.5px; color:#8a7d95; cursor:pointer;}
  .view-btn.active{background:var(--teal-deep); color:#fff; border-color:var(--teal-deep);}

  .toolbar{display:flex; justify-content:space-between; align-items:center; margin:18px 0 14px; flex-wrap:wrap; gap:8px;}
  .count-tag{font-family:'Space Mono',monospace; font-size:12px; color:#8a7d95;}
  .count-tag .amt{color:var(--teal-deep); font-weight:700; margin-left:6px;}
  .add-btn{background:var(--coral); color:#fff; border:none; padding:11px 18px; border-radius:10px; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 3px 0 #A83F56;}
  .add-btn:active{transform:translateY(2px); box-shadow:none;}

  .empty{text-align:center; padding:50px 20px; color:#9b8fa0; border:1px dashed var(--line); border-radius:14px; font-size:14px;}

  .cat-section{margin-bottom:20px;}
  .cat-head{display:flex; align-items:center; gap:8px; margin-bottom:8px; padding-left:2px;}
  .cat-head .cat-icon{font-size:16px;}
  .cat-head .cat-name{font-weight:700; font-size:14px; color:var(--ink);}
  .cat-head .cat-count{font-family:'Space Mono',monospace; font-size:11px; color:#9b8fa0;}
  .cat-head .cat-bar{flex:1; height:1px; background:var(--line);}

  .item-row{
    display:flex; align-items:flex-start; gap:10px; background:var(--card);
    border-radius:12px; padding:10px 12px; margin-bottom:8px; border-left:4px solid #ccc;
    box-shadow:0 1px 2px rgba(60,30,80,.05);
  }
  .item-row.done{opacity:.55;}
  .item-row.done .item-title{text-decoration:line-through; color:#9b8fa0;}
  .item-row .item-check{width:19px; height:19px; margin-top:2px; accent-color:var(--teal); flex:0 0 auto; cursor:pointer;}
  .item-main{flex:1; min-width:0; cursor:pointer;}
  .item-top{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap;}
  .item-time{font-family:'Space Mono',monospace; font-size:12px; color:var(--teal-deep); font-weight:700;}
  .item-title{font-size:14.5px; font-weight:600; color:var(--ink);}
  .item-tags{display:flex; align-items:center; gap:6px; margin-top:5px; flex-wrap:wrap;}
  .mini-pill{font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; font-family:'Space Mono',monospace;}
  .mini-pill.need{background:#FBE2E6; color:#B84A61;}
  .mini-pill.done-pill{background:#EBE0F5; color:var(--teal-deep);}
  .mini-pill.amount{background:#FCF1DC; color:var(--gold-deep);}
  .cat-tag{font-size:10px; font-weight:700; padding:2px 8px; border-radius:999px; font-family:'Space Mono',monospace; background:#F0E9DE; color:#6B5A4A; display:inline-flex; align-items:center; gap:3px;}
  .mini-link{font-size:11px; font-weight:600; color:var(--teal); text-decoration:none; border:1px solid var(--teal); padding:2px 8px; border-radius:999px;}
  .mini-photo{width:26px; height:26px; border-radius:6px; object-fit:cover; cursor:zoom-in; border:1px solid var(--line);}
  .item-edit{flex:0 0 auto; border:none; background:transparent; color:#b3a6c2; font-size:14px; cursor:pointer; padding:2px 4px;}
  .item-edit:hover{color:var(--teal);}

  .grand-total-bar{
    display:flex; justify-content:space-between; align-items:center; background:var(--card);
    border-radius:12px; padding:12px 16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(60,30,80,.06);
  }
  .grand-total-bar .label{font-size:13px; color:#8a7d95; font-weight:600;}
  .grand-total-bar .value{font-family:'Space Mono',monospace; font-size:18px; font-weight:700; color:var(--teal-deep);}

  .table-wrap{overflow:auto; background:var(--card); border-radius:14px; box-shadow:0 1px 3px rgba(60,30,80,.06); padding:4px; max-height:75vh;}
  table.grid-table{border-collapse:collapse; font-size:12.5px; width:100%;}
  table.grid-table th{
    background:var(--teal-deep); color:#fff; padding:9px 8px; font-size:12px; font-weight:700;
    position:sticky; top:0; z-index:2; text-align:center; white-space:nowrap; min-width:140px;
  }
  table.grid-table th.hour-head{left:0; z-index:3; min-width:64px;}
  table.grid-table td.hour-label{
    position:sticky; left:0; background:var(--sand); color:var(--teal-deep); font-weight:700;
    font-family:'Space Mono',monospace; font-size:11.5px; text-align:center; padding:6px 4px;
    border-bottom:1px solid var(--line); border-right:1px solid var(--line); min-width:64px; z-index:1;
  }
  table.grid-table tr.unset-row td.hour-label{background:#EEE6D8;}
  table.grid-table td.grid-cell{
    border-bottom:1px solid var(--line); border-right:1px solid var(--line);
    padding:4px; vertical-align:top; min-width:140px; min-height:34px;
  }
  .grid-item{
    background:#F3E8FA; border-left:3px solid var(--teal); border-radius:6px; padding:4px 6px;
    margin-bottom:3px; cursor:pointer; font-size:12px; font-weight:600; color:var(--ink); line-height:1.35;
  }
  .grid-item:hover{background:#EAD9F5;}
  .grid-item.done{opacity:.5; text-decoration:line-through;}
  .grid-item .gi-time{display:block; font-family:'Space Mono',monospace; font-size:10px; font-weight:700; color:var(--teal-deep);}

  /* --- Modal --- */
  .overlay{position:fixed; inset:0; background:rgba(20,15,30,.5); display:none; align-items:flex-start; justify-content:center; padding:30px 16px; overflow-y:auto; z-index:50;}
  .overlay.open{display:flex;}
  .modal{background:var(--paper); border-radius:16px; max-width:480px; width:100%; padding:24px; box-shadow:0 20px 50px rgba(0,0,0,.25);}
  .modal h2{font-family:'Fraunces',serif; font-size:22px; margin:0 0 16px; color:var(--teal-deep);}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:#8a7d95; margin-bottom:5px;}
  .field input[type=text], .field input[type=time], .field input[type=date], .field input[type=number], .field input[type=url], .field select{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:9px; font-family:inherit; font-size:14px; background:#fff; color:var(--ink);
  }
  .time-row{display:flex; gap:10px;}
  .time-row .field{flex:1;}
  .radio-row{display:flex; gap:8px; flex-wrap:wrap;}
  .radio-row label{display:flex; align-items:center; gap:5px; border:1px solid var(--line); border-radius:9px; padding:7px 10px; font-size:12px; font-weight:600; color:#8a7d95; cursor:pointer; text-transform:none;}
  .radio-row input{margin:0;}
  .radio-row label.sel-need{border-color:var(--coral); color:var(--coral); background:#FBE2E6;}
  .radio-row label.sel-done{border-color:var(--teal); color:var(--teal-deep); background:#EBE0F5;}
  .radio-row label.sel-none{border-color:#9b9483; color:#6B6455; background:#F0E9DE;}
  .radio-row label.sel-cat{border-color:var(--teal); color:var(--teal-deep); background:#EBE0F5;}
  .amount-input-wrap{position:relative;}
  .amount-input-wrap span{position:absolute; right:12px; top:9px; font-size:13px; color:#9b8fa0;}

  .photo-input-row{display:flex; gap:8px; align-items:center;}
  .photo-input-row input[type=file]{font-size:12px;}
  .photo-preview{margin-top:8px; max-width:140px; border-radius:8px; border:1px solid var(--line); display:none;}

  .modal-actions{display:flex; justify-content:space-between; gap:10px; margin-top:20px;}
  .btn{padding:10px 16px; border-radius:9px; border:none; font-weight:700; font-size:14px; cursor:pointer;}
  .btn.cancel{background:transparent; color:#6B6455; border:1px solid var(--line);}
  .btn.save{background:var(--teal-deep); color:#fff;}
  .btn.delete-entry{background:transparent; color:#C7521F; border:1px solid #D9607A;}

  .lightbox{position:fixed; inset:0; background:rgba(10,5,15,.85); display:none; align-items:center; justify-content:center; z-index:60; padding:20px;}
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%; max-height:100%; border-radius:8px;}

  .saved-badge{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--teal-deep); color:#fff; font-size:12px; font-weight:600; padding:8px 16px; border-radius:999px;
    opacity:0; transition:all .25s ease; pointer-events:none; font-family:'Space Mono',monospace;
  }
  .saved-badge.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .error-badge{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#C7364F; color:#fff; font-size:12px; font-weight:700; padding:9px 18px; border-radius:999px;
    opacity:0; transition:all .25s ease; pointer-events:none; z-index:70; max-width:88vw; text-align:center;
  }
  .error-badge.show{opacity:1; transform:translateX(-50%) translateY(0);}
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="sky-deco">
      <div class="star" style="top:14px; left:12%; animation-delay:.2s;"></div>
      <div class="star" style="top:30px; left:28%; animation-delay:1.1s;"></div>
      <div class="star" style="top:10px; left:52%; animation-delay:.6s;"></div>
      <div class="star" style="top:40px; left:68%; animation-delay:1.8s;"></div>
      <div class="star" style="top:20px; left:85%; animation-delay:.9s;"></div>
      <div class="star" style="top:52px; left:8%; animation-delay:1.4s;"></div>
      <div class="star" style="top:6px; left:78%; animation-delay:2.1s;"></div>
      <div class="lantern" style="left:10%; animation-duration:12s; animation-delay:0s;"></div>
      <div class="lantern" style="left:32%; animation-duration:15s; animation-delay:3s; transform:scale(.8);"></div>
      <div class="lantern" style="left:58%; animation-duration:11s; animation-delay:6s; transform:scale(1.15);"></div>
      <div class="lantern" style="left:78%; animation-duration:14s; animation-delay:1.5s; transform:scale(.9);"></div>
      <div class="lantern" style="left:92%; animation-duration:13s; animation-delay:4.5s; transform:scale(.7);"></div>
    </div>
    <span class="honeymoon-label">✨ OUR ITINERARY ✨</span>
    <span class="honeymoon-script">Honeymoon</span>
    <h1 id="tripTitle">우리의 신혼여행 일정</h1>
    <div class="sub">8월 1일~8월 16일 올랜도&뉴욕</div>

    <div class="days-row" id="daysRow"></div>
  </header>

  <div class="view-toggle">
    <button class="view-btn active" id="detailViewBtn">📋 하루씩 보기</button>
    <button class="view-btn" id="tableViewBtn">🗂 전체 표로 보기</button>
  </div>

  <div id="detailView">
    <div class="toolbar">
      <div class="count-tag" id="countTag">0 / 0 완료</div>
      <button class="add-btn" id="openAddBtn">🏮 일정 추가</button>
    </div>
    <div id="listArea"></div>
  </div>

  <div id="tableView" style="display:none; margin-top:16px;">
    <div class="grand-total-bar">
      <span class="label">전체 여행 경비 합계</span>
      <span class="value" id="grandTotalValue">₩0</span>
    </div>
    <div class="table-wrap"><div id="tableArea"></div></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">일정 추가</h2>

    <div class="field">
      <label>대항목</label>
      <div class="radio-row" id="catRow"></div>
    </div>

    <div class="time-row">
      <div class="field"><label>시작 시간 (선택, 00~24시)</label><input type="text" inputmode="numeric" placeholder="예: 18:30" id="fStart"></div>
      <div class="field"><label>종료 시간 (선택, 00~24시)</label><input type="text" inputmode="numeric" placeholder="예: 21:00" id="fEnd"></div>
    </div>

    <div class="field">
      <label>일정 내용</label>
      <input type="text" id="fTitle" placeholder="예: 나리타공항 → 호텔 이동">
    </div>

    <div class="field">
      <label>금액 (선택)</label>
      <div class="amount-input-wrap">
        <input type="number" id="fAmount" placeholder="0" min="0" step="1000">
        <span>원</span>
      </div>
    </div>

    <div class="field">
      <label>예약 여부</label>
      <div class="radio-row" id="resRow">
        <label data-v="none"><input type="radio" name="res" value="none">예약 불필요</label>
        <label data-v="need"><input type="radio" name="res" value="need">예약 필요</label>
        <label data-v="done"><input type="radio" name="res" value="done">예약 완료</label>
      </div>
    </div>

    <div class="field">
      <label>장소 (선택, 누르면 구글맵으로 이동)</label>
      <input type="text" id="fPlace" placeholder="예: 인천국제공항 2터미널">
    </div>

    <div class="field">
      <label>예약 링크 (선택)</label>
      <input type="url" id="fLink" placeholder="https://...">
    </div>

    <div class="field">
      <label>사진 (URL 붙여넣기 또는 파일 첨부, 선택)</label>
      <div class="photo-input-row"><input type="url" id="fPhotoUrl" placeholder="https://..." style="flex:1;"></div>
      <input type="file" id="fPhotoFile" accept="image/*" style="margin-top:6px;">
      <img id="photoPreview" class="photo-preview">
    </div>

    <div class="modal-actions">
      <button class="btn delete-entry" id="deleteEntryBtn" style="display:none;">삭제</button>
      <div style="flex:1;"></div>
      <button class="btn cancel" id="cancelBtn">취소</button>
      <button class="btn save" id="saveBtn">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="dayOverlay">
  <div class="modal">
    <h2 id="dayModalTitle">일자 추가</h2>
    <div class="field"><label>날짜 (선택, 달력에 표시하려면 입력)</label><input type="date" id="dDate"><div id="dDateHint" style="font-size:11px; color:#9b8fa0; margin-top:4px;"></div></div>
    <div class="field"><label>라벨 (선택, 비우면 날짜로 자동 표시)</label><input type="text" id="dLabel" placeholder="예: 이동일 / Day 1"></div>
    <div class="modal-actions">
      <button class="btn delete-entry" id="dayDeleteBtn" style="display:none;">삭제</button>
      <div style="flex:1;"></div>
      <button class="btn cancel" id="dayCancelBtn">취소</button>
      <button class="btn save" id="daySaveBtn">저장</button>
    </div>
  </div>
</div>

<div class="overlay" id="confirmOverlay">
  <div class="modal" style="max-width:340px;">
    <h2 style="font-size:18px;" id="confirmTitle">삭제할까요?</h2>
    <p id="confirmMessage" style="font-size:14px; color:#6B6455; margin:0 0 18px;"></p>
    <div class="modal-actions">
      <div style="flex:1;"></div>
      <button class="btn cancel" id="confirmNoBtn">취소</button>
      <button class="btn delete-entry" id="confirmYesBtn" style="background:var(--coral); color:#fff; border:none;">삭제</button>
    </div>
  </div>
</div>

<div class="lightbox" id="lightbox"><img id="lightboxImg"></div>
<div class="saved-badge" id="savedBadge">저장됨</div>
<div class="error-badge" id="errorBadge"></div>

<script>
const CATEGORIES = [
  { id:'move',  label:'이동', icon:'🚗', color:'var(--c-move)' },
  { id:'meal',  label:'식사', icon:'🍽', color:'var(--c-meal)' },
  { id:'sight', label:'관람', icon:'🎡', color:'var(--c-sight)' },
  { id:'shop',  label:'쇼핑', icon:'🛍', color:'var(--c-shop)' },
  { id:'stay',  label:'숙소', icon:'🏨', color:'var(--c-stay)' },
  { id:'etc',   label:'기타', icon:'✨', color:'var(--c-etc)' },
];
const WEEKDAYS = ['일','월','화','수','목','금','토'];
function catInfo(id){ return CATEGORIES.find(c=>c.id===id) || CATEGORIES[CATEGORIES.length-1]; }
function catColor(c){ return getComputedStyle(document.documentElement).getPropertyValue(c.color.slice(4,-1)).trim() || '#ccc'; }
function formatWon(n){ return '₩' + (Number(n)||0).toLocaleString('ko-KR'); }
function mapUrl(place){ return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(place); }
function formatDateLabel(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return `${d.getMonth()+1}월 ${d.getDate()}일 (${WEEKDAYS[d.getDay()]})`;
}
function dayDisplayLabel(day, idx){
  return day.label || (day.date ? formatDateLabel(day.date) : ('Day ' + (idx+1)));
}

function showConfirm(message){
  return new Promise(resolve=>{
    const overlay = document.getElementById('confirmOverlay');
    document.getElementById('confirmMessage').textContent = message;
    overlay.classList.add('open');
    const yesBtn = document.getElementById('confirmYesBtn');
    const noBtn = document.getElementById('confirmNoBtn');
    function cleanup(result){
      overlay.classList.remove('open');
      yesBtn.onclick = null; noBtn.onclick = null;
      resolve(result);
    }
    yesBtn.onclick = ()=>cleanup(true);
    noBtn.onclick = ()=>cleanup(false);
    overlay.onclick = (e)=>{ if(e.target.id==='confirmOverlay') cleanup(false); };
  });
}

function normalizeTime(v){
  v = (v||'').trim();
  if(!v) return '';
  v = v.replace(/[^0-9:]/g,'');
  let h, m;
  if(v.includes(':')){
    const parts = v.split(':');
    h = parts[0]; m = parts[1] || '0';
  } else if(v.length<=2){
    h = v; m = '0';
  } else {
    h = v.slice(0, v.length-2); m = v.slice(-2);
  }
  h = parseInt(h||'0',10); m = parseInt(m||'0',10);
  if(isNaN(h)) h=0; if(isNaN(m)) m=0;
  if(h>24) h=24; if(h<0) h=0;
  if(m>59) m=59; if(m<0) m=0;
  if(h===24) m=0;
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
}

function fbPath(key){ return key.replace(/:/g, '/'); }

const STORAGE_PREFIX = 'honeymoon-trip:';
async function storageGet(key){
  if(fbDb){
    try{
      const snap = await fbDb.ref(fbPath(key)).once('value');
      const raw = snap.val();
      return raw ? JSON.parse(raw) : null;
    }catch(e){ console.error('불러오기 실패', e); return null; }
  }
  try{ const raw = localStorage.getItem(STORAGE_PREFIX + key); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
async function storageSet(key, value){
  if(fbDb){
    try{ await fbDb.ref(fbPath(key)).set(JSON.stringify(value)); flashSaved(); return true; }
    catch(e){ console.error('저장 실패', e); showError('❗ 저장 실패했어요. 인터넷 연결을 확인해주세요.'); return false; }
  }
  try{ localStorage.setItem(STORAGE_PREFIX + key, JSON.stringify(value)); flashSaved(); return true; }
  catch(e){ console.error('저장 실패', e); showError('❗ 저장 실패했어요. (기기 저장공간이 가득 찼을 수 있어요)'); return false; }
}
async function storageDelete(key){
  if(fbDb){
    try{ await fbDb.ref(fbPath(key)).remove(); return true; }
    catch(e){ return false; }
  }
  try{ localStorage.removeItem(STORAGE_PREFIX + key); return true; }
  catch(e){ return false; }
}

let defaultDayCreated = false;
const watchedItemDays = new Set();
function watchDayItems(dayId){
  if(!fbDb || watchedItemDays.has(dayId)) return;
  watchedItemDays.add(dayId);
  fbDb.ref(fbPath('trip:items:' + dayId)).on('value', (snap)=>{
    const raw = snap.val();
    const items = raw ? JSON.parse(raw) : [];
    state.itemsByDay[dayId] = items.map(it => ({ category:'etc', done:false, amount:0, ...it }));
    if(state.activeDayId === dayId && state.view==='detail') renderList();
    if(state.view==='table') renderTable();
  });
}

async function applyLoadedDays(days){
  if(!days || !days.length){
    if(defaultDayCreated) return; // 방금 만든 기본 일차가 아직 반영 전
    defaultDayCreated = true;
    days = [{id: uid(), label:'', date:''}];
    await storageSet('trip:days', days);
    return; // 위 저장이 다시 로드를 트리거함 (fb) 또는 아래에서 계속 진행 (localStorage)
  }
  state.days = days.map(d => ({ label:'', date:'', ...d }));
  if(!state.activeDayId || !state.days.find(d=>d.id===state.activeDayId)){
    state.activeDayId = state.days[0].id;
  }
  for(const d of state.days){
    if(fbDb){
      if(!state.itemsByDay[d.id]) state.itemsByDay[d.id] = [];
      watchDayItems(d.id);
    } else {
      const items = await storageGet('trip:items:' + d.id);
      state.itemsByDay[d.id] = (items || []).map(it => ({ category:'etc', done:false, amount:0, ...it }));
    }
  }
  renderDays();
  buildCatRow();
  if(state.view==='detail') renderList();
  if(state.view==='table') renderTable();
}

async function init(){
  buildCatRow();
  if(fbDb){
    // 실시간 동기화: 날짜 목록이 바뀔 때마다(추가/삭제 등) 자동으로 다시 불러와 화면 갱신
    fbDb.ref(fbPath('trip:days')).on('value', async (snap)=>{
      const raw = snap.val();
      const days = raw ? JSON.parse(raw) : null;
      await applyLoadedDays(days);
    });
  } else {
    const days = await storageGet('trip:days');
    await applyLoadedDays(days);
  }
}

function dayTotal(dayId){
  return (state.itemsByDay[dayId]||[]).reduce((sum,i)=> sum + (Number(i.amount)||0), 0);
}
function grandTotal(){

}

function timeToMin(t){ if(!t) return 99999; const [h,m] = t.split(':').map(Number); return h*60+m; }

    const photoEl = row.querySelector('.mini-photo');
    if(photoEl) photoEl.onclick = ()=>{ document.getElementById('lightboxImg').src=item.photo; document.getElementById('lightbox').classList.add('open'); };
    row.querySelector('.item-edit').onclick = ()=> openModal(item);
    row.querySelector('.item-main').onclick = (e)=>{ if(e.target.tagName!=='A') openModal(item); };

  });

function renderTable(){
  document.getElementById('grandTotalValue').textContent = formatWon(grandTotal());
  const area = document.getElementById('tableArea');
  area.innerHTML = '';

  const sortedDays = state.days.slice().sort((a,b)=>{
    if(a.date && b.date) return a.date.localeCompare(b.date);
    if(a.date) return -1;
    if(b.date) return 1;
    return 0;
  });

  if(!sortedDays.length){
    area.innerHTML = '<div class="empty">아직 일차가 없어요.</div>';
    return;
  }

  // 사용된 시간대 범위 계산 (시작 시간이 있는 일정 기준)
  let hours = [];
  sortedDays.forEach(d=>{
    (state.itemsByDay[d.id]||[]).forEach(i=>{
      if(i.start){ hours.push(parseInt(i.start.split(':')[0],10)); }
    });
  });
  let minH = hours.length ? Math.max(0, Math.min(...hours)-1) : 8;
  let maxH = hours.length ? Math.min(23, Math.max(...hours)+1) : 21;

  const table = document.createElement('table');
  table.className = 'grid-table';
  let theadHtml = '<thead><tr><th class="hour-head">시간</th>';
  sortedDays.forEach((d,i)=>{
    const idx = state.days.indexOf(d);
    theadHtml += `<th>${escapeHtml(dayDisplayLabel(d, idx))}</th>`;
  });
  theadHtml += '</tr></thead>';
  table.innerHTML = theadHtml;

  const tbody = document.createElement('tbody');

  function cellForHour(d, hour){
    const items = (state.itemsByDay[d.id]||[]).filter(i=>{
      if(!i.start) return false;
      return parseInt(i.start.split(':')[0],10) === hour;
    }).sort((a,b)=>timeToMin(a.start)-timeToMin(b.start));
    const td = document.createElement('td');
    td.className = 'grid-cell';
    if(!items.length) return td;
    items.forEach(item=>{
      const line = document.createElement('div');
      line.className = 'grid-item' + (item.done ? ' done' : '');
      line.innerHTML = `<span class="gi-time">${item.start}</span>${escapeHtml(item.title||'')}`;
      line.onclick = ()=>{
        state.activeDayId = d.id; state.view = 'detail'; switchView();
        renderDays(); renderList();
        window.scrollTo({top:0, behavior:'smooth'});
      };
      td.appendChild(line);
    });
    return td;
  }

  for(let h=minH; h<=maxH; h++){
    const tr = document.createElement('tr');
    const hourTd = document.createElement('td');
    hourTd.className = 'hour-label';
    hourTd.textContent = String(h).padStart(2,'0') + '시';
    tr.appendChild(hourTd);
    sortedDays.forEach(d=> tr.appendChild(cellForHour(d, h)));
    tbody.appendChild(tr);
  }

  // 시간 미정 일정 모아보기
  const hasUnset = sortedDays.some(d=> (state.itemsByDay[d.id]||[]).some(i=>!i.start));
  if(hasUnset){
    const tr = document.createElement('tr');
    tr.className = 'unset-row';
    const hourTd = document.createElement('td');
    hourTd.className = 'hour-label';
    hourTd.textContent = '시간 미정';
    tr.appendChild(hourTd);
    sortedDays.forEach(d=>{
      const items = (state.itemsByDay[d.id]||[]).filter(i=>!i.start);
      const td = document.createElement('td');
      td.className = 'grid-cell';
      items.forEach(item=>{
        const line = document.createElement('div');
        line.className = 'grid-item' + (item.done ? ' done' : '');
        line.textContent = item.title || '';
        line.onclick = ()=>{
          state.activeDayId = d.id; state.view = 'detail'; switchView();
          renderDays(); renderList();
          window.scrollTo({top:0, behavior:'smooth'});
        };
        td.appendChild(line);
      });
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  }

  table.appendChild(tbody);
  area.appendChild(table);
}

function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function openModal(item){
  editingItemId = item ? item.id : null;
  currentPhotoData = item ? (item.photo || '') : '';
  document.getElementById('modalTitle').textContent = item ? '일정 수정' : '일정 추가';
  document.getElementById('fStart').value = item ? (item.start||'') : '';
  document.getElementById('fEnd').value = item ? (item.end||'') : '';
  document.getElementById('fTitle').value = item ? (item.title||'') : '';
  document.getElementById('fAmount').value = item && item.amount ? item.amount : '';
  document.getElementById('fLink').value = item ? (item.link||'') : '';
  document.getElementById('fPlace').value = item ? (item.place||'') : '';
  document.getElementById('fPhotoUrl').value = (item && item.photo && item.photo.startsWith('http')) ? item.photo : '';
  document.getElementById('fPhotoFile').value = '';
  const preview = document.getElementById('photoPreview');
  if(currentPhotoData){ preview.src = currentPhotoData; preview.style.display='block'; } else { preview.style.display='none'; }

  const resVal = item ? (item.reservation||'none') : 'none';
  document.querySelectorAll('#resRow input').forEach(r=>{
    r.checked = (r.value === resVal);
    r.parentElement.classList.toggle('sel-' + r.value, r.checked);
  });

  const catVal = item ? (item.category||'etc') : 'etc';
  document.querySelectorAll('#catRow input').forEach(r=>{
    r.checked = (r.value === catVal);
    r.parentElement.classList.toggle('sel-cat', r.checked);
  });

  document.getElementById('deleteEntryBtn').style.display = item ? 'inline-block' : 'none';
  document.getElementById('overlay').classList.add('open');
}
function closeModal(){ document.getElementById('overlay').classList.remove('open'); editingItemId=null; currentPhotoData=''; }

document.getElementById('openAddBtn').onclick = ()=> openModal(null);
document.getElementById('cancelBtn').onclick = closeModal;
document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeModal(); };
document.getElementById('lightbox').onclick = ()=> document.getElementById('lightbox').classList.remove('open');

document.querySelectorAll('#resRow label').forEach(lbl=>{
  lbl.addEventListener('click', ()=>{
    document.querySelectorAll('#resRow label').forEach(l=>l.classList.remove('sel-need','sel-done','sel-none'));
    lbl.classList.add('sel-' + lbl.dataset.v);
  });
});

document.getElementById('fPhotoUrl').addEventListener('input', (e)=>{
  const url = e.target.value.trim();
  if(url){ currentPhotoData = url; const preview=document.getElementById('photoPreview'); preview.src=url; preview.style.display='block'; }
});
document.getElementById('fPhotoFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    const img = new Image();
    img.onload = ()=>{
      const maxW = 360;
      const scale = Math.min(1, maxW / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale; canvas.height = img.height * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      currentPhotoData = canvas.toDataURL('image/jpeg', 0.5);
      const preview = document.getElementById('photoPreview');
      preview.src = currentPhotoData; preview.style.display = 'block';
      document.getElementById('fPhotoUrl').value = '';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

document.getElementById('saveBtn').onclick = async ()=>{
  const start = normalizeTime(document.getElementById('fStart').value);
  const title = document.getElementById('fTitle').value.trim();
  if(!title){ showError('일정 내용을 입력해주세요.'); return; }
  const end = normalizeTime(document.getElementById('fEnd').value);
  const amount = Number(document.getElementById('fAmount').value) || 0;
  const link = document.getElementById('fLink').value.trim();
  const place = document.getElementById('fPlace').value.trim();
  const reservation = document.querySelector('#resRow input:checked')?.value || 'none';
  const category = document.querySelector('#catRow input:checked')?.value || 'etc';

  const list = state.itemsByDay[state.activeDayId] || [];
  if(editingItemId){
    const existing = list.find(i=>i.id===editingItemId);
    Object.assign(existing, { start, end, title, amount, link, place, reservation, category, photo: currentPhotoData });
  } else {
    list.push({ id: uid(), start, end, title, amount, link, place, reservation, category, photo: currentPhotoData, done:false });
  }
  state.itemsByDay[state.activeDayId] = list;
  const ok = await storageSet('trip:items:' + state.activeDayId, list);
  if(!ok) return;
  closeModal();
  renderList(); renderTable();
};

document.getElementById('deleteEntryBtn').onclick = async ()=>{
  if(!(await showConfirm('이 일정을 삭제할까요?'))) return;
  let list = state.itemsByDay[state.activeDayId] || [];
  list = list.filter(i=>i.id !== editingItemId);
  state.itemsByDay[state.activeDayId] = list;
  await storageSet('trip:items:' + state.activeDayId, list);
  closeModal();
  renderList(); renderTable();
};

/* day modal */
function suggestNextDate(){
  const withDates = state.days.filter(d=>d.date).sort((a,b)=> a.date.localeCompare(b.date));
  if(!withDates.length) return '';
  const last = withDates[withDates.length-1].date;
  const d = new Date(last + 'T00:00:00');
  d.setDate(d.getDate()+1);
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function openDayModal(day){
  editingDayId = day ? day.id : null;
  document.getElementById('dayModalTitle').textContent = day ? '일차 수정' : '일차 추가';
  const suggested = day ? '' : suggestNextDate();
  document.getElementById('dDate').value = day ? (day.date||'') : suggested;
  document.getElementById('dLabel').value = day ? (day.label||'') : '';
  document.getElementById('dDateHint').textContent = suggested ? `이전 일차 다음날로 자동 채웠어요 (필요하면 수정하세요)` : '';
  document.getElementById('dayDeleteBtn').style.display = (day && state.days.length>1) ? 'inline-block' : 'none';
  document.getElementById('dayOverlay').classList.add('open');
}
function closeDayModal(){ document.getElementById('dayOverlay').classList.remove('open'); editingDayId=null; }
document.getElementById('dayCancelBtn').onclick = closeDayModal;
document.getElementById('dayOverlay').onclick = (e)=>{ if(e.target.id==='dayOverlay') closeDayModal(); };

document.getElementById('daySaveBtn').onclick = async ()=>{
  const date = document.getElementById('dDate').value;
  const label = document.getElementById('dLabel').value.trim();
  if(editingDayId){
    const d = state.days.find(x=>x.id===editingDayId);
    d.date = date; d.label = label;
  } else {
    const nd = { id: uid(), date, label };
    state.days.push(nd);
    state.itemsByDay[nd.id] = [];
    state.activeDayId = nd.id;
    state.view = 'detail'; switchView();
  }
  await storageSet('trip:days', state.days);
  closeDayModal();
  renderDays(); renderList(); renderTable();
};
document.getElementById('dayDeleteBtn').onclick = async ()=>{
  if(!(await showConfirm('이 일차와 그 안의 모든 일정을 삭제할까요?'))) return;
  state.days = state.days.filter(x=>x.id!==editingDayId);
  delete state.itemsByDay[editingDayId];
  await storageSet('trip:days', state.days);
  await storageDelete('trip:items:' + editingDayId);
  if(state.activeDayId === editingDayId) state.activeDayId = state.days[0].id;
  closeDayModal();
  renderDays(); renderList(); renderTable();
};

init();
</script>
</body>
</html>
